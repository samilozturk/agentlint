stages:
  - test
  - publish

variables:
  PNPM_VERSION: "10"

# ---------------------------------------------------------------------------
# Test job — runs on every push and merge request
# ---------------------------------------------------------------------------
test:
  stage: test
  image: node:24
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
    - pnpm run typecheck
    - pnpm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# Publish @agent-lint/mcp
#
# Auth strategy (checked in order):
#   1. OIDC trusted publishing — if configured on npmjs.com (zero secrets)
#      Requires trusted publisher on npmjs.com:
#        Namespace: bsamilozturk | Project: agentlint
#        CI file: .gitlab-ci.yml | Environment: (blank)
#   2. Token-based fallback — if NPM_TOKEN CI/CD variable is set
#      Create: npmjs.com → Access Tokens → Generate New Token → Granular
#      Add as masked CI/CD variable: Settings → CI/CD → Variables → NPM_TOKEN
# ---------------------------------------------------------------------------
publish-mcp:
  stage: publish
  image: node:24
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
    - pnpm run build
  script:
    - npm install -g npm@latest
    - node --version && npm --version
    # Token-based fallback — if NPM_TOKEN is set, write .npmrc for auth
    - |
      if [ -n "$NPM_TOKEN" ]; then
        echo "Auth: using NPM_TOKEN (token-based)"
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      else
        echo "Auth: using OIDC trusted publishing"
      fi
    - cd packages/mcp
    - npm publish --access public --provenance
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

# ---------------------------------------------------------------------------
# Publish @agent-lint/cli
# Same auth strategy as publish-mcp (OIDC first, NPM_TOKEN fallback)
# ---------------------------------------------------------------------------
publish-cli:
  stage: publish
  image: node:24
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
    - pnpm run build
  script:
    - npm install -g npm@latest
    - node --version && npm --version
    - |
      if [ -n "$NPM_TOKEN" ]; then
        echo "Auth: using NPM_TOKEN (token-based)"
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      else
        echo "Auth: using OIDC trusted publishing"
      fi
    - cd packages/cli
    - npm publish --access public --provenance
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
