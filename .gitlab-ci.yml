stages:
  - test
  - publish

variables:
  PNPM_VERSION: "10"

# ---------------------------------------------------------------------------
# Test job — runs on every push and merge request
# ---------------------------------------------------------------------------
test:
  stage: test
  image: node:24
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
    - pnpm run typecheck
    - pnpm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# Publish @agent-lint/mcp — OIDC trusted publishing (no tokens needed)
# Requires trusted publisher configured on npmjs.com:
#   Namespace: bsamilozturk | Project: agentlint | CI file: .gitlab-ci.yml
# ---------------------------------------------------------------------------
publish-mcp:
  stage: publish
  image: node:24
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
    - pnpm run build
  script:
    - node --version
    - npm install -g npm@latest
    - npm --version
    - echo "NPM_ID_TOKEN is set:${NPM_ID_TOKEN:+yes}"
    - cd packages/mcp
    - npm publish --access public --provenance
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  environment:
    name: npm-mcp
    url: https://www.npmjs.com/package/@agent-lint/mcp

# ---------------------------------------------------------------------------
# Publish @agent-lint/cli — OIDC trusted publishing (no tokens needed)
