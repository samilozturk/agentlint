stages:
  - test
  - publish

variables:
  PNPM_VERSION: "10"

test:
  stage: test
  image: node:24
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
    - pnpm run typecheck
    - pnpm run lint
    - pnpm run test
    - (cd packages/cli && npm pack --dry-run)
    - (cd packages/mcp && npm pack --dry-run)
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^(cli|mcp)-v/

publish-mcp:
  stage: publish
  needs: ["test"]
  image: node:24
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
    - pnpm run build
    - pnpm run typecheck
    - pnpm run lint
    - pnpm run test
  script:
    - |
      VERSION=$(node -p 'require("./packages/mcp/package.json").version')
      test "$CI_COMMIT_TAG" = "mcp-v$VERSION"
    - npm install -g npm@latest
    - |
      if [ -n "$NPM_TOKEN" ]; then
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      fi
    - cd packages/mcp
    - npm pack --dry-run
    - npm publish --access public --provenance
  rules:
    - if: $CI_COMMIT_TAG =~ /^mcp-v/

publish-cli:
  stage: publish
  needs: ["test"]
  image: node:24
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
    - pnpm run build
    - pnpm run typecheck
    - pnpm run lint
    - pnpm run test
  script:
    - |
      VERSION=$(node -p 'require("./packages/cli/package.json").version')
      test "$CI_COMMIT_TAG" = "cli-v$VERSION"
    - npm install -g npm@latest
    - |
      if [ -n "$NPM_TOKEN" ]; then
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      fi
    - cd packages/cli
    - npm pack --dry-run
    - npm publish --access public --provenance
  rules:
    - if: $CI_COMMIT_TAG =~ /^cli-v/
