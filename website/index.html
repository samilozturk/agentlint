<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Lint — ESLint for your coding agents</title>
    <meta
      name="description"
      content="Keep AGENTS.md, rules, skills, workflows, and plans structured, current, and codebase-aware. CLI + MCP tools for 13+ IDE clients."
    />
    <meta
      property="og:title"
      content="Agent Lint — ESLint for your coding agents"
    />
    <meta
      property="og:description"
      content="Keep AGENTS.md, rules, skills, workflows, and plans structured, current, and codebase-aware."
    />
    <meta property="og:type" content="website" />
    <!-- Prevent layout shift from font loading -->
    <meta name="color-scheme" content="light dark" />
    <!-- Preload LCP image (demo-scan, first visible tab) before JS is parsed -->
    <link rel="preload" as="image" href="/agentlint/screenshots/demo-scan.svg" />
  </head>
  <body>
    <script>
      // Sync theme before first paint to prevent flash/repaint during animations
      (function() {
        var t = localStorage.getItem('agentlint-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        if (t === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
